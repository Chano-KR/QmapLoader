<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QmapLoader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
    <header class="site-header">
        <h1 class="logo">QmapLoader</h1>
        <span class="version">v1.0</span>
    </header>

    <main class="container">
        <section class="intro">
            <h2>PDF를 Markdown으로 변환합니다.</h2>
            <p class="subtitle">파일을 업로드하면 로컬에서 변환되어 결과 폴더에 저장됩니다.</p>
        </section>

        <section class="card" id="card" data-state="idle">
            <!-- IDLE -->
            <div class="state state-idle">
                <div class="upload-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 16V4" />
                        <path d="M6 10l6-6 6 6" />
                        <path d="M4 20h16" />
                    </svg>
                </div>
                <p class="drop-text">여기에 PDF를 끌어다 놓으세요</p>
                <p class="drop-sub">또는</p>
                <button type="button" class="btn-primary" id="choose-file-btn">파일 선택</button>
                <input type="file" id="file-input" accept="application/pdf,.pdf" hidden />
            </div>

            <!-- RUNNING -->
            <div class="state state-running">
                <div class="spinner" aria-hidden="true"></div>
                <p class="file-name" id="running-filename"></p>
                <p class="status-text" id="running-status">변환 중…</p>
            </div>

            <!-- DONE -->
            <div class="state state-done">
                <div class="status-icon success" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 6L9 17l-5-5" />
                    </svg>
                </div>
                <p class="file-name" id="done-filename"></p>
                <p class="status-text">변환이 완료되었습니다.</p>
                <div class="actions">
                    <a class="btn-primary" id="download-link" href="#" download>Markdown 다운로드</a>
                    <button type="button" class="btn-secondary" id="open-folder-btn">결과 폴더 열기</button>
                    <button type="button" class="btn-ghost" id="reset-btn-done">새 변환</button>
                </div>
            </div>

            <!-- FAILED -->
            <div class="state state-failed">
                <div class="status-icon error" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 8v5" />
                        <circle cx="12" cy="16" r="1" fill="currentColor" stroke="none" />
                        <circle cx="12" cy="12" r="10" />
                    </svg>
                </div>
                <p class="file-name" id="failed-filename"></p>
                <p class="status-text error-text" id="failed-message">변환에 실패했습니다.</p>
                <p class="status-help" id="failed-next-step" hidden>다시 시도해 주세요.</p>
                <div class="actions">
                    <button type="button" class="btn-primary" id="reset-btn-failed">다시 시도</button>
                    <button type="button" class="btn-secondary" id="open-folder-btn-failed">결과 폴더 열기</button>
                </div>
            </div>
        </section>

        <div class="footer-actions">
            <button type="button" class="btn-text" id="open-folder-footer">결과 폴더 열기</button>
        </div>
    </main>

    <footer class="credit">made by Chano</footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
